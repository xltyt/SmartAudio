set LOG_DIR "{ROOT_DIR}/log"
set CACHE_DIR "{ROOT_DIR}/cache"
Documents "{ROOT_DIR}/documents"
Home "{ROOT_DIR}"
Listen {ROOT_PORT}
#<if SSL_MODULE>
#    ListenSecure 443
#</if>

#<Route />
#    Prefix /
#    Documents {ROOT_DIR}/documents
#    #Prefix {ROOT_DIR}
#    #Documents documents
#    AuthType none
#    #AddHandler espHandler
#</Route>

#
#   Error logging configuration. This is for server errors. 
#   This is overridden by appweb command line args.
#
ErrorLog "error.log" size=10MB level=2 backup=5 anew

#
#   Define the request tracing log. This is for client requests and responses 
#   including HTTP headers. This is overridden by appweb command line args.
#
#   TraceLog "access.log" level=5 size=10MB backup=5 anew formatter=common format="%h %l %u %t "%r" %>s %b %n"

#
#   The user and group account to run as. The fake name APPWEB will change
#   user/group to the Appweb default user/group if running as root/adminstrator.
#   This is www on MAC, nobody/nogroup on Linux, and administrator on Windows. 
#   NOTE: ESP and EJS require write access to the cache directory. if you wish 
#   to backup log files, you must have write permission to the log file directory. 
#
GroupAccount work
UserAccount work

#
#   SSL/TLS configuration
#
<if SSL_MODULE>
    ListenSecure {ROOT_SSL_PORT}
    #
    #   Define your certificate and key here
    #
    SSLCertificateFile "{ROOT_DIR}/etc/server.crt"
    SSLCertificateKeyFile "{ROOT_DIR}/etc/server.key"
    #
    #   Redirect all traffic over HTTPS
    #
    #   Redirect secure

    #
    #   This will force browsers to insist on TLS connections for one year
    #
    #   Strict-Transport-Security max-age=31536000; includeSubDomains
</if>

#
#   Remove default security headers if required
#
#   Header remove X-Frame-Options
#   Header remove X-XSS-Protection
#   Header remove X-Content-Type-Options

#
#   For CGI scripts, such as your Perl scripts make sure that you have 
#   "#!/PerlPath" as the first line. This works on Windows as well.
#   The .bat and .cmd extensions are really only for Windows.
#   
<if CGI_MODULE>
    AddHandler cgiHandler cgi cgi-nph out bat cmd pl py
    ScriptAlias /cgi-bin/ "${DOCUMENTS}/../cgi-bin"
    Action application/x-perl /usr/bin/perl
    Action application/x-python /usr/bin/python
    Action application/x-lua /usr/bin/lua
    Action application/x-ruby /usr/bin/ruby
    LimitProcesses 10
    CgiPrefix CGI_
    CgiEscape on
</if>

<if EJS_MODULE>
    LoadModule ejsHandler libmod_ejs
    AddHandler ejsHandler es ejs
</if>

<if ESP_MODULE>
    # Module loaded by default 
    AddHandler espHandler esp
</if>

<if PHP_MODULE>
    LoadModule phpHandler libmod_php
    AddHandler phpHandler php
</if>

<Route ^/{controller}$>
    Reset pipeline
    Prefix / 
    Documents "{ROOT_DIR}/documents"
    #AddHandler espHandler esp
    AddHandler espHandler
    Source ${controller}.c
    Target run $1
</Route>

<Route ^/{controller}/{action}(/)*$>
    Reset pipeline
    Prefix / 
    Documents "{ROOT_DIR}/documents"
    #AddHandler espHandler esp
    AddHandler espHandler
    Source ${controller}.c
    Target run $1/$2
</Route>

#
#   The fileHandler catches all other extensions
#
AddHandler fileHandler

#
#   Upload filter
#
#<Route /uploads>
#  AddInputFilter uploadFilter
#  UploadDir /tmp
#  LimitUpload 200MB
#</Route>
# Ref: https://github.com/embedthis/appweb/blob/master/test/appweb.conf
LimitUpload 200MB
UploadDir "{ROOT_DIR}/tmp"
UploadAutoDelete on
AddInputFilter uploadFilter

#
#   Cache static content in the browser for 1 day
#
Cache client=1day extensions="html,css,gif,jpeg,jpg,png,pdf,ico,js,txt"

#
#   Session state duration.
#
SessionTimeout 30mins

#
#   Set the cookie name and determine if the cookie is visible to Javascript
#   (default is httponly, invisible to scripts). Making cookies visible
#   increases the XSS potential.
#
#   SessionCookie name=NAME visible=false

#
#   Maximum duration to parse the request headers
#
RequestParseTimeout 5sec

#
#   Maximum request duration.
#
RequestTimeout 10mins

#
#   Maximum request and connection inactivity duration
#
InactivityTimeout 1min

#
#   Request timeout when appweb is terminating or restarting
#
ExitTimeout 30secs

#LimitMemory 20MB

MemoryPolicy restart

#
#   Show errors to the browser. WARNING: this may disclose unwanted information. 
#   Do not enable in production releases
#
ShowErrors off

# LogRoutes
#EspApp prefix="/" config="{ROOT_DIR}/esp.json"
#EspApp "{ROOT_DIR}/esp.json"
